<style>
:root{--red:#BC1D24;--vino:#4B0F1E;--auberg:#1A1712;--gold:#D4AF37;--gold2:#D4AF37;--bg:#06080C;--panel:#101019;--cream:#F2EFE7;--muted:#A39C8C;--line:#23222C;--grad:linear-gradient(90deg,#D4AF37,#D4AF37,#B8901F);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--cream);padding:102px 20px 44px;}
.lang{position:fixed;top:72px;right:20px;display:flex;gap:2px;border:1px solid #23222C;border-radius:11px;padding:3px;background:rgba(13,13,15,.7);backdrop-filter:blur(6px);}
.lang button{padding:6px 12px;border:none;background:transparent;color:var(--muted);font-weight:500;font-size:13px;border-radius:8px;cursor:pointer;letter-spacing:1px;}
.lang button.active{background:var(--gold);color:#F2EFE7;}
.wrap{max-width:640px;margin:0 auto;text-align:center;}
.home{display:inline-block;color:var(--muted);text-decoration:none;font-size:12px;letter-spacing:2px;margin-bottom:16px;}
.home:hover{color:var(--gold);}
h1{font-family:'Sora',sans-serif;font-size:clamp(38px,9vw,56px);letter-spacing:6px;padding-left:6px;}
.tag{color:var(--gold);font-size:12px;letter-spacing:5px;margin-top:6px;text-transform:uppercase;}
.lead{font-size:18px;color:#F2EFE7;margin:22px 0 6px;line-height:1.5;}
.sub{font-size:13px;color:var(--muted);margin-bottom:26px;}
.steps{text-align:left;}
.step{display:flex;gap:16px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:12px;align-items:flex-start;}
.step.solnota{border-left:4px solid #7d6a3a;}
.step.artist{border-left:4px solid var(--gold);}
.n{flex:none;width:42px;height:42px;border-radius:50%;border:2px solid var(--gold);color:var(--gold);font-family:'Sora',sans-serif;font-size:22px;display:flex;align-items:center;justify-content:center;}
.solnota .n{border-color:#D4AF37;color:#B8901F;}
.st h2{font-size:17px;font-weight:700;margin-bottom:4px;}
.st p{font-size:14px;color:#A39C8C;line-height:1.5;}
.who{display:inline-block;font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:8px;padding:3px 9px;border-radius:999px;}
.who.a{background:rgba(255,176,46,.15);color:var(--gold);}
.who.s{background:rgba(125,106,58,.22);color:#B8901F;}
.cta{display:inline-block;background:var(--grad);color:#F2EFE7;font-weight:700;font-size:17px;padding:16px 32px;border-radius:13px;text-decoration:none;margin:24px 0 8px;transition:transform .15s;}
.cta:hover{transform:translateY(-2px);}
.note{font-size:13px;color:var(--muted);margin-bottom:8px;}
footer{margin-top:30px;font-size:11px;color:#A39C8C;letter-spacing:2px;}
/* Modo oscuro: colores fijos corregidos */
html.dark .lead{color:#EDE6D6}
html.dark .st p{color:#bdb4a2}
</style>
<style id="premium-polish">
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Sora:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap');
.sn-wm{font-family:'Cinzel',Georgia,serif!important;font-weight:600!important;letter-spacing:0!important;background:none!important;-webkit-text-fill-color:#D4AF37!important;color:#D4AF37!important;display:inline-flex;align-items:center;gap:0;line-height:1} .sn-disc{position:relative;display:inline-block;width:.78em;height:.78em;border-radius:50%;margin:0 .02em;background:repeating-radial-gradient(circle at 50% 50%,rgba(255,255,255,.08) 0 1px,rgba(0,0,0,.05) 1px 2.5px),conic-gradient(from 210deg,#D4AF37,#D4AF37,#E8941C,#A85F00,#D4AF37,#D4AF37,#E8941C,#D4AF37,#D4AF37);box-shadow:inset 0 0 0 1.4px #A85F00;flex:0 0 auto} .sn-disc::before{content:'';position:absolute;inset:31%;border-radius:50%;background:#06080C} .sn-disc::after{content:'';position:absolute;inset:41%;border-radius:50%;background:#F2EFE7}
.sn-mark{width:1.18em;height:1.18em;display:inline-flex;flex:0 0 auto}
.sn-mark svg{width:100%;height:100%;display:block}

/* profundidad premium: tarjetas flotan sobre marfil */
.card,.panel,.result,.box,.tcard,.screen,.plan,.tier{box-shadow:0 1px 2px rgba(0,0,0,.05),0 10px 30px rgba(0,0,0,.09)}

/* ===== Pulido premium universal SOLNOTA ===== */
html{scroll-behavior:smooth}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:rgba(255,176,46,.28);color:#F2EFE7}
h1,h2,h3{text-wrap:balance}
p,li{text-wrap:pretty}
a,button{transition:color .18s ease,background-color .18s ease,border-color .18s ease,transform .18s ease,box-shadow .18s ease}
a:focus-visible,button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid #D4AF37;outline-offset:3px;border-radius:8px}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}a,button{transition:none}}
</style>

function setLang(l){
  var t=T[l]; document.documentElement.lang=l;
  document.getElementById('tag').textContent=t.tag;
  document.getElementById('lead').textContent=t.lead;
  document.getElementById('sub').textContent=t.sub;
  document.getElementById('cta').textContent=t.cta;
  document.getElementById('note').textContent=t.note;
  document.getElementById('steps').innerHTML=t.steps.map(function(s,i){
    return '<div class="step '+(s.a?'artist':'solnota')+'"><div class="n">'+(i+1)+'</div><div class="st"><h2>'+s.t+'</h2><p>'+s.p+'</p><span class="who '+(s.a?'a':'s')+'">'+s.who+'</span></div></div>';
  }).join("");
  ['es','en','pt','fr'].forEach(function(x){document.getElementById('btn-'+x).classList.toggle('active',l===x);});
}
(function(){var n=(navigator.language||'es').slice(0,2).toLowerCase();setLang(['es','en','pt','fr'].indexOf(n)>=0?n:'es');})();
