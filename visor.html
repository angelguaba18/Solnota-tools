<style>
  :root{--red:#BC1D24;--vino:#4B0F1E;--auberg:#1A1712;--gold:#D4AF37;--bg:#06080C;--card:#101019;--line:#23222C;--txt:#F2EFE7;--mut:#A39C8C;--ok:#E7E4D7;--bad:#FF5E5E;
    --grad:linear-gradient(90deg,#D4AF37,#D4AF37,#D4AF37,#B8901F);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1200px 800px at 50% -8%,#0B0D13,#06080C 55%);color:var(--txt);font-family:'Inter',sans-serif;padding:28px 20px;min-height:100vh}
  .wrap{max-width:1100px;margin:0 auto}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  h1{font-family:'Sora',sans-serif;font-weight:400;font-size:38px;letter-spacing:2px;
     background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .tag{font-family:'Inter',sans-serif;font-weight:700;font-size:12px;letter-spacing:3px;color:var(--mut)}
  .roles{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0 4px}
  .role{background:var(--card);border:1px solid var(--line);color:var(--mut);padding:9px 14px;border-radius:999px;
        font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
  .role.on{background:var(--grad);color:#F2EFE7;border-color:transparent}
  .search{display:flex;gap:10px;margin:12px 0 8px;flex-wrap:wrap}
  input{flex:1;min-width:220px;background:var(--card);border:1px solid var(--line);color:var(--txt);
        padding:14px 16px;border-radius:12px;font-size:16px;font-family:inherit;outline:none}
  input:focus{border-color:var(--gold)}
  button{background:var(--grad);color:#F2EFE7;border:none;padding:14px 22px;border-radius:12px;
         font-family:'Inter',sans-serif;font-weight:800;font-size:15px;cursor:pointer;white-space:nowrap}
  button.ghost{background:transparent;border:1px solid var(--line);color:var(--txt)}
  button:active{transform:translateY(1px)}
  .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:18px 0}
  .c{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px}
  .c .n{font-family:'Inter',sans-serif;font-weight:900;font-size:30px}
  .c .l{color:var(--mut);font-size:12px;letter-spacing:1px;text-transform:uppercase;margin-top:4px}
  .c.cover .n{color:var(--gold)}
  table{width:100%;border-collapse:collapse;margin-top:10px;background:var(--card);
        border:1px solid var(--line);border-radius:14px;overflow:hidden}
  th,td{text-align:left;padding:12px 14px;font-size:14px;border-bottom:1px solid var(--line)}
  th{font-family:'Inter',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--mut)}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#13131F}
  .code{font-family:monospace;font-size:13px;color:var(--ok)}
  .code.no{color:var(--bad)}
  a.lk{color:var(--gold);text-decoration:none;font-weight:700}
  .msg{color:var(--mut);padding:24px;text-align:center}
  .note{color:var(--mut);font-size:13px;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-top:10px}
  .row-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-top:8px}
  @media(max-width:680px){.cards{grid-template-columns:repeat(2,1fr)}.hide-m{display:none}}
  .ctabtn{display:inline-block;background:var(--grad);color:#F2EFE7;text-decoration:none;padding:11px 16px;border-radius:10px;font-weight:800;font-size:13px}
svg.i{width:1em;height:1em;vertical-align:-.14em;display:inline-block;flex:none}.ic svg.i,.tbi svg.i,.srcc h3 svg.i,.warn svg.i,.free b svg.i,.tail svg.i{color:var(--gold)}</style>

<header style="position:sticky;top:0;z-index:900;-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);background:rgba(11,12,16,.82);border-bottom:1px solid var(--line);margin:-28px -20px 24px"><div style="max-width:1140px;margin:0 auto;padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-wrap:wrap;gap:6px 0"><a href="/" style="display:flex;align-items:center;text-decoration:none"><img src="SOLNOTA-logo-header.png" alt="SOLNOTA — Tu música. Tu valor. Recuperado." style="height:44px;width:auto"></a><nav style="display:flex;gap:18px;align-items:center;font-size:13px;font-weight:600;color:var(--mut);margin-right:190px"><a href="/empezar.html" style="color:inherit;text-decoration:none">Cómo funciona</a><a href="/precios.html" style="color:inherit;text-decoration:none">Precios</a><a href="/aprende.html" style="color:inherit;text-decoration:none">Aprende</a></nav></div></header>
<div class="wrap">
  <div class="brand"><span class="tag brand-tag">Tu música. Tu valor. <b style="color:var(--red)">Recuperado.</b></span></div>

  <div class="roles" id="roles"></div>

  <div class="search" id="search">
    <input id="q" placeholder="Escribe el nombre…" value="Sandy Mo" onkeydown="if(event.key==='Enter')buscar()">
    <button onclick="buscar()">Escanear</button>
  </div>

  <div id="out"><div class="msg">Elige un rol y escanea.</div></div>
</div>

<script>
const BASE = "https://bdjjalwlcuhfzjeqxtwi.supabase.co/functions/v1/";
const ROLES = [
  {id:"cantante",   label:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><rect x='9' y='2' width='6' height='12' rx='3'/><path d='M5 11a7 7 0 0 0 14 0M12 18v3M8 21h8'/></svg> Cantante",   ep:"apple?artist=",    codeType:"ISRC",
    cta:[{l:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='2' x2='12' y2='22'/><path d='M17 5.5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'/></svg> Reclamar regalías",h:"/dinero"},{l:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z'/></svg> Registrar + CWR",h:"/split"}]},
  {id:"audiopoeta", label:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><line x1='4' y1='9' x2='4' y2='15'/><line x1='9' y1='5' x2='9' y2='19'/><line x1='15' y1='7' x2='15' y2='17'/><line x1='20' y1='10' x2='20' y2='14'/></svg> Audiopoeta", ep:"apple?artist=",    codeType:"ISRC",
    cta:[{l:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><line x1='12' y1='2' x2='12' y2='22'/><path d='M17 5.5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6'/></svg> Reclamar regalías",h:"/dinero"},{l:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z'/></svg> Registrar + CWR",h:"/split"}]},
  {id:"compositor", label:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z'/></svg> Compositor", ep:"composer?name=",   codeType:"ISWC", landing:true,
    note:"El compositor cobra por su OBRA (ISWC + splits). Ese dinero se reclama registrando la obra y generando el CWR para PROs y MLC — no con un escaneo por nombre.",
    cta:[{l:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z'/></svg> Registrar obra + generar CWR",h:"/split"}]},
  {id:"productor",  label:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><line x1='4' y1='21' x2='4' y2='14'/><line x1='4' y1='10' x2='4' y2='3'/><line x1='12' y1='21' x2='12' y2='12'/><line x1='12' y1='8' x2='12' y2='3'/><line x1='20' y1='21' x2='20' y2='16'/><line x1='20' y1='12' x2='20' y2='3'/><line x1='2' y1='14' x2='6' y2='14'/><line x1='10' y1='8' x2='14' y2='8'/><line x1='18' y1='16' x2='22' y2='16'/></svg> Productor",  ep:"producer?name=",   codeType:"crédito", landing:true,
    note:"El productor cobra del MÁSTER vía Letter of Direction a SoundExchange. No tiene ISRC propio (es del cantante). Vas a /lod, escaneas al CANTANTE y armas la carta con el % del productor.",
    cta:[{l:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z'/><path d='M14 2v6h6'/></svg> Generar Letter of Direction",h:"/lod"}]},
  {id:"audiolibro", label:"<svg class='i' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><path d='M4 19.5A2.5 2.5 0 0 1 6.5 17H20'/><path d='M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z'/></svg> Audiolibro", ep:"audiobook?name=",  codeType:"Apple Books ID",
    cta:[]},
];
let ROLE = ROLES[0];
let CURRENT = [];
let QNAME = "";

function pintarRoles(){
  document.getElementById('roles').innerHTML = ROLES.map(r=>
    '<button class="role'+(r.id===ROLE.id?' on':'')+'" onclick="setRole(\''+r.id+'\')">'+r.label+'</button>').join('');
}
function setRole(id){ ROLE = ROLES.find(r=>r.id===id); pintarRoles();
  const out=document.getElementById('out');
  const search=document.getElementById('search');
  if(ROLE.landing){ search.style.display='none'; out.innerHTML = '<div class="note">ℹ️ '+esc(ROLE.note)+'</div>'+ctaHtml(ROLE); }
  else { search.style.display=''; out.innerHTML = '<div class="msg">Escribe un nombre y escanea.</div>'; }
}
function ctaHtml(r){
  if(!r.cta||!r.cta.length) return '';
  return '<div class="row-top" style="margin-top:14px;gap:8px">'+r.cta.map(c=>'<a class="ctabtn" href="'+c.h+'">'+c.l+'</a>').join('')+'</div>';
}

async function buscar(){
  const q = document.getElementById('q').value.trim();
  if(!q){ return; }
  const out = document.getElementById('out');
  out.innerHTML = '<div class="msg">Escaneando “'+q+'” como '+ROLE.label+'… (puede tardar unos segundos)</div>';
  try{
    const r = await fetch(BASE + ROLE.ep + encodeURIComponent(q));
    const d = await r.json();
    if(d.configured === false){ out.innerHTML = '<div class="msg">⚠️ '+(d.msg||'Motor no configurado')+'</div>'; return; }
    if(d.ok === false || d.error){ out.innerHTML = '<div class="msg">⚠️ '+(d.error||'Error')+'</div>'; return; }
    const items = normaliza(d);
    if(items.length===0){
      out.innerHTML = '<div class="msg">No se encontró “'+q+'” en este rol.'+(d.note?'<br><br>'+d.note:'')+'</div>'; return;
    }
    CURRENT = items; QNAME = d.artist || d.query || q;
    render(items, d.note);
  }catch(e){
    out.innerHTML = '<div class="msg">❌ Error de conexión: '+e.message+'</div>';
  }
}

// Normaliza la respuesta de cualquier motor a un formato unico
function normaliza(d){
  if(d.tracks){ // motor apple (cantante/audiopoeta)
    return d.tracks.map(t=>({title:t.title, sub:t.album||'', date:t.date||'', code:t.isrc||null, codeType:'ISRC', link:t.link||''}));
  }
  return (d.items||[]).map(i=>({title:i.title, sub:i.sub||'', date:i.date||'', code:i.code||null, codeType:i.codeType||ROLE.codeType, link:i.link||''}));
}

function render(items, note){
  const total = items.length;
  const ok = items.filter(i=>i.code).length;
  const falta = total-ok;
  const pct = total ? Math.round(ok/total*100) : 0;
  const ct = items[0].codeType || ROLE.codeType;
  const rows = items.map((t,i)=>{
    const yr = (t.date||'').slice(0,4);
    const code = t.code ? '<span class="code">'+esc(t.code)+'</span>' : '<span class="code no">— falta</span>';
    const lk = t.link ? '<a class="lk" href="'+t.link+'" target="_blank">↗</a>' : '';
    return '<tr><td>'+(i+1)+'</td><td>'+esc(t.title)+'</td>'
      +'<td class="hide-m">'+esc(t.sub)+'</td>'
      +'<td class="hide-m">'+yr+'</td><td>'+code+'</td><td>'+lk+'</td></tr>';
  }).join('');
  document.getElementById('out').innerHTML =
    (note?'<div class="note">ℹ️ '+esc(note)+'</div>':'')
    + '<div class="cards">'
    + card(total,'Resultados') + card(ok,'Con '+ct) + card(falta,'Faltantes') + card(pct+'%','Cobertura','cover')
    + '</div>'
    + '<div class="row-top"><div class="tag">'+esc(QNAME)+' · '+ROLE.label+'</div>'
    + '<button class="ghost" onclick="csv()">⬇ Exportar CSV</button></div>'
    + '<table><thead><tr><th>#</th><th>Título</th><th class="hide-m">Detalle</th>'
    + '<th class="hide-m">Año</th><th>'+ct+'</th><th></th></tr></thead><tbody>'
    + rows + '</tbody></table>'
    + ctaHtml(ROLE);
}
function card(n,l,cls){return '<div class="c '+(cls||'')+'"><div class="n">'+n+'</div><div class="l">'+l+'</div></div>';}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function csv(){
  const head=['Titulo','Detalle','Fecha','Codigo','Link'];
  const lines=CURRENT.map(t=>[t.title,t.sub,t.date,t.code||'',t.link].map(v=>'"'+String(v||'').replace(/"/g,'""')+'"').join(','));
  const blob=new Blob([head.join(',')+'\n'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='SOLNOTA_'+ROLE.id+'_'+QNAME.replace(/\s+/g,'_')+'.csv';a.click();
}

pintarRoles();
buscar(); // carga Sandy Mo (cantante) al abrir
</script>
