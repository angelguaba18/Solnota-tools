body{font-family:'Inter',-apple-system,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:46px 22px;}

.lang button{padding:6px 13px;border:none;background:transparent;color:var(--muted);font-weight:500;font-size:13px;border-radius:8px;cursor:pointer;letter-spacing:1px;}
.lang button.active{background:var(--gold);color:#F2EFE7;}
.card{max-width:600px;width:100%;text-align:center;}
.home{display:inline-block;color:var(--muted);text-decoration:none;font-size:12px;letter-spacing:2px;margin-bottom:18px;}

.tag{color:var(--gold);font-size:12px;letter-spacing:5px;margin-top:6px;text-transform:uppercase;}
.h2{font-family:'Sora',sans-serif;font-size:28px;color:var(--cream);margin:26px 0 4px;}
.lead{font-size:17px;color:#F2EFE7;margin:8px 0 4px;line-height:1.5;}
.sub{font-size:13px;color:var(--muted);margin-bottom:22px;}
.form{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:24px;text-align:left;}
.q{margin-bottom:16px;}
.q label{display:block;font-size:14px;color:#F2EFE7;margin-bottom:7px;font-weight:500;}
select{width:100%;padding:13px 14px;border-radius:11px;border:1px solid #23222C;background:#101019;color:var(--cream);font-size:15px;font-family:inherit;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%23C9A24B' stroke-width='2'><path d='M6 9l6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 14px center;}
select:focus{outline:none;border-color:var(--gold);}
button.cta{width:100%;margin-top:6px;padding:16px;border:none;border-radius:12px;background:var(--gold);color:#F2EFE7;font-weight:600;font-size:16px;cursor:pointer;transition:transform .15s,background .15s;letter-spacing:.5px;}
button.cta:hover{transform:translateY(-2px);background:var(--gold2);}
.result{display:none;margin-top:24px;text-align:left;}
.block{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:14px;}
.block.red{border-color:#A39C8C;}
.block.green{border-color:#274a2e;}
.b-t{font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
.red .b-t{color:var(--red);}
.green .b-t{color:var(--green);}
.row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #0E1016;}
.row:last-child{border-bottom:none;}
.dot{flex:none;margin-top:2px;font-size:13px;}
.red .dot{color:var(--red);}
.green .dot{color:var(--green);}
.rtx{font-size:14px;color:#A39C8C;line-height:1.45;}
.rtx b{color:var(--cream);}
.note{background:#1a160c;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:10px;padding:14px 16px;font-size:13.5px;color:#A39C8C;line-height:1.55;margin-bottom:14px;}
.note b{color:var(--gold2);}
.alerts .b-t{color:var(--gold);}
.alerts .row .dot{color:var(--gold);}
.cta-box{background:var(--panel);border:1px solid var(--gold);border-radius:16px;padding:22px;margin-top:6px;text-align:center;}
.cta-box p{font-size:14px;margin-bottom:12px;color:#F2EFE7;}
.cta-box form{display:flex;gap:8px;flex-wrap:wrap;}
.cta-box input{flex:1;min-width:180px;padding:14px;border-radius:11px;border:1px solid #23222C;background:#101019;color:var(--cream);font-size:15px;font-family:inherit;}
.cta-box input:focus{outline:none;border-color:var(--gold);}
.cta-box button{padding:14px 22px;border:none;border-radius:11px;background:var(--gold);color:#F2EFE7;font-weight:600;font-size:15px;cursor:pointer;}
.msg{display:none;margin-top:14px;font-size:15px;color:var(--gold2);font-weight:500;}
.disc{font-size:11px;color:#A39C8C;line-height:1.6;margin-top:16px;}
footer{margin-top:30px;font-size:11px;color:#A39C8C;letter-spacing:2px;text-align:center;}

html.dark .rtx,html.dark .disc{color:#bdb4a2}
html.dark select,html.dark .q select{background:#15140f;color:#EDE6D6;border-color:#F2EFE7}

  if(a.deal==="none"){
    clock=t.clk.none;
    alerts.push("free");
    return finalize(green,red,alerts,clock);
  }
  if(a.deal==="dist"||a.deal==="threesixty"){
    red.master=true; delete green.master;
    red.ugc=true; delete green.ugc;
    red.neigh=true; delete green.neigh;
    if(a.yt==="yes"){red.youtube=true; delete green.youtube;}
    // se artist always green; mlc/pro green unless publishing deal
  }
  if(a.deal==="pub"){
    // publishing-only: masters stay with artist, publishing managed by publisher
    red.mlc=true; delete green.mlc;
    red.pro=true; delete green.pro;
    red.sync=true; delete green.sync;
  }
  if(a.pub==="yes" && a.deal!=="pub"){
    red.sync=true; delete green.sync;
    alerts.push("pub");
  }
  // SoundExchange artist share is ALWAYS the artist's
  green.se=true; delete red.se;
  // clock
  if(a.recoup==="yes") clock=t.clk.yes; else clock=t.clk.no;
  // alerts
  if(a.excl==="yes") alerts.push("excl");
  if(a.yt==="yes" && (a.deal==="dist"||a.deal==="threesixty")) alerts.push("yt");
  if(a.deal==="dist"||a.deal==="threesixty") alerts.push("master");
  if(Object.keys(green).length) alerts.push("free");
  return finalize(green,red,alerts,clock);
}
function finalize(green,red,alerts,clock){
  var g=SRC.filter(function(s){return green[s];});
  var r=SRC.filter(function(s){return red[s];});
  // de-dup alerts preserving order
  var seen={},al=[]; alerts.forEach(function(x){if(!seen[x]){seen[x]=1;al.push(x);}});
  return {green:g,red:r,alerts:al,clock:clock};
}

function run(){
  var t=T[L];

  document.getElementById("greenT").textContent=t.greenT;
  document.getElementById("greenRows").innerHTML=res.green.map(function(s){return rowHTML(t.src[s]);}).join("")||rowHTML("—");
  document.getElementById("greenBlock").style.display=res.green.length?"block":"none";
  // red
  document.getElementById("redT").textContent=t.redT;
  document.getElementById("redRows").innerHTML=res.red.map(function(s){return rowHTML(t.src[s]);}).join("");
  document.getElementById("redBlock").style.display=res.red.length?"block":"none";
  // alerts
  document.getElementById("alertT").textContent=t.alertT;
  document.getElementById("alertRows").innerHTML=res.alerts.map(function(k){return rowHTML(t.al[k]);}).join("");
  document.getElementById("alertBlock").style.display=res.alerts.length?"block":"none";
  document.getElementById("result").style.display="block";
  document.getElementById("result").scrollIntoView({behavior:"smooth",block:"start"});
}
