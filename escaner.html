<style>
:root{--gold:#FFB02E;--gold2:#FFC65C;--bg:#FCFAF5;--panel:#FBF8F0;--cream:#1A1611;--muted:#6E6657;--line:#ECE6D8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',-apple-system,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;}
.lang{position:fixed;top:20px;right:22px;display:flex;gap:2px;border:1px solid #ECE6D8;border-radius:11px;padding:3px;}
.lang button{padding:6px 13px;border:none;background:transparent;color:var(--muted);font-weight:500;font-size:13px;border-radius:8px;cursor:pointer;letter-spacing:1px;}
.lang button.active{background:var(--gold);color:#1a160c;}
.card{max-width:560px;width:100%;text-align:center;}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(44px,11vw,70px);letter-spacing:8px;padding-left:8px;background:linear-gradient(90deg,#FFC65C,#FFB02E,#B96A00);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.tag{color:var(--gold);font-size:12px;letter-spacing:5px;margin-top:6px;text-transform:uppercase;}
.lead{font-size:19px;color:#2A2419;margin:28px 0 6px;line-height:1.5;}
.sub{font-size:14px;color:var(--muted);margin-bottom:26px;}
form{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
input{flex:1;min-width:230px;padding:16px 18px;border-radius:12px;border:1px solid #ECE6D8;background:#FBF8F0;color:var(--cream);font-size:16px;font-family:inherit;}
input:focus{outline:none;border-color:var(--gold);}
button.cta{padding:16px 28px;border:none;border-radius:12px;background:var(--gold);color:#1a160c;font-weight:600;font-size:16px;cursor:pointer;transition:transform .15s,background .15s;letter-spacing:.5px;}
button.cta:hover{transform:translateY(-2px);background:var(--gold2);}
button.cta:disabled{opacity:.5;cursor:wait;transform:none;}
.result{display:none;margin-top:30px;background:var(--panel);border:1px solid var(--gold);border-radius:18px;padding:30px;text-align:left;}
.result .num{font-family:'Space Grotesk',sans-serif;font-size:64px;color:var(--cream);line-height:1;}
.result .lbl{font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:18px;}
.result .big{font-family:'Space Grotesk',sans-serif;font-size:30px;color:var(--gold);line-height:1.25;margin-bottom:6px;}
.samples{font-size:13px;color:#6E6657;margin:14px 0;line-height:1.7;}
.samples b{color:var(--gold);}
.moneymap{margin:18px 0 4px;border-top:1px solid var(--line);padding-top:16px;}
.moneymap .mm-t{font-size:13px;color:var(--gold);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.mm-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #F4EFE2;}
.mm-row:last-child{border-bottom:none;}
.mm-ic{color:var(--gold);font-size:15px;flex:none;margin-top:1px;}
.mm-tx{font-size:13px;color:#4a4438;line-height:1.45;}
.mm-tx b{color:var(--cream);}
.cta-box{margin-top:18px;border-top:1px solid var(--line);padding-top:18px;}
.cta-box p{font-size:14px;margin-bottom:12px;color:#2A2419;}
.msg{display:none;margin-top:16px;font-size:16px;color:var(--gold2);font-weight:500;}
.err{color:#e0a; font-size:14px; margin-top:12px; display:none;}
footer{margin-top:34px;font-size:11px;color:#6E6657;letter-spacing:2px;}
.prodlink{margin-top:16px;font-size:13px;color:var(--gold);cursor:pointer;font-weight:600;}
.prodlink:hover{text-decoration:underline;}
.prodhelp{display:none;margin-top:22px;background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:24px;text-align:left;}
.prodhelp .ph-t{font-family:'Space Grotesk',sans-serif;font-size:21px;color:var(--gold);margin-bottom:8px;line-height:1.2;}
.prodhelp .ph-tx{font-size:14px;color:#4a4438;line-height:1.5;margin-bottom:16px;}
.phbtn{display:block;width:100%;text-align:left;padding:13px 16px;margin-bottom:10px;border:1px solid var(--line);border-radius:12px;background:#fff;color:var(--cream);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;}
.phbtn:last-child{margin-bottom:0;}
.phbtn:hover{border-color:var(--gold);transform:translateY(-1px);}
</style>
<style id="premium-polish">
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Space+Grotesk:wght@400;500;700&display=swap');
.sn-wm{font-family:'Fraunces',Georgia,serif!important;font-weight:600!important;letter-spacing:0!important;background:none!important;-webkit-text-fill-color:#1A1611!important;color:#1A1611!important;display:inline-flex;align-items:center;gap:0;line-height:1} .sn-disc{position:relative;display:inline-block;width:.78em;height:.78em;border-radius:50%;margin:0 .02em;background:repeating-radial-gradient(circle at 50% 50%,rgba(255,255,255,.08) 0 1px,rgba(0,0,0,.05) 1px 2.5px),conic-gradient(from 210deg,#FFEBC4,#FFD27A,#E8941C,#A85F00,#FFCf6b,#FFEBC4,#E8941C,#FFD27A,#FFEBC4);box-shadow:inset 0 0 0 1.4px #A85F00;flex:0 0 auto} .sn-disc::before{content:'';position:absolute;inset:31%;border-radius:50%;background:#FCFAF5} .sn-disc::after{content:'';position:absolute;inset:41%;border-radius:50%;background:#1A1611}

.sn-mark svg{width:100%;height:100%;display:block}

/* profundidad premium: tarjetas flotan sobre marfil */
.card,.panel,.result,.box,.tcard,.screen,.plan,.tier{box-shadow:0 1px 2px rgba(36,30,15,.05),0 10px 30px rgba(36,30,15,.09)}

/* ===== Pulido premium universal SOLNOTA ===== */
html{scroll-behavior:smooth}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:rgba(255,176,46,.28);color:#1A1611}
h1,h2,h3{text-wrap:balance}
p,li{text-wrap:pretty}
a,button{transition:color .18s ease,background-color .18s ease,border-color .18s ease,transform .18s ease,box-shadow .18s ease}
a:focus-visible,button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid #FFB02E;outline-offset:3px;border-radius:8px}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}a,button{transition:none}}
/* Modo oscuro: el escáner tiene colores fijos; se corrigen aquí */
html.dark .lead{color:#EDE6D6}
html.dark .sub,html.dark .samples,html.dark footer{color:#9b927f}
html.dark .cta-box p,html.dark .prodhelp .ph-tx,html.dark .mm-tx{color:#bdb4a2}
html.dark .mm-tx b{color:#EDE6D6}
html.dark input{background:#15140f;border-color:#2a2620;color:#EDE6D6}
html.dark .lang{border-color:#2a2620;background:#0E0E16}
html.dark .phbtn{background:#1b1913;color:#EDE6D6;border-color:#2a2620}
html.dark .result,html.dark .prodhelp{background:#15140f}
html.dark .mm-row{border-bottom-color:#2a2620}
</style>

let L="es", last={artist:"",total:0,bb:0,year:0,sample:[],shown:false};
function renderResult(t){
  document.getElementById('rNum').textContent=last.total;
  document.getElementById('rLbl').textContent=t.lbl;
  document.getElementById('rBig').innerHTML=t.big(last.bb);
  var _yrs=last.year?(new Date().getFullYear()-last.year):0;
  document.getElementById('rSince').innerHTML=last.year?t.since(last.year,_yrs):"";
  document.getElementById('rMap').innerHTML='<div class="mm-t">'+t.mapT+'</div>'+t.map;
  document.getElementById('rSamples').innerHTML=last.sample&&last.sample.length?t.ej+last.sample.map(s=>`<b>${s}</b>`).join(" · "):"";
}
function setLang(l){
  L=l; const t=T[l]; document.documentElement.lang=l;
  document.getElementById('tag').textContent=t.tag;
  document.getElementById('lead').innerHTML=t.lead;
  document.getElementById('sub').textContent=t.sub;
  document.getElementById('artist').placeholder=t.ph;
  document.getElementById('scanBtn').textContent=t.scan;
  document.getElementById('email').placeholder=t.emailph;
  document.getElementById('joinBtn').textContent=t.join;
  document.getElementById('ctaP').innerHTML=t.ctaP;
  document.getElementById('prodLink').textContent=t.prodLink;
  document.getElementById('phT').textContent=t.phT;
  document.getElementById('phTx').textContent=t.phTx;
  document.getElementById('phA').textContent=t.phA;
  document.getElementById('phB').textContent=t.phB;
  document.getElementById('phC').textContent=t.phC;
  ['es','en','pt','fr'].forEach(function(x){document.getElementById('btn-'+x).classList.toggle('active',l===x);});
  try{localStorage.setItem('solnota_lang',l);}catch(e){}
  if(last.shown) renderResult(t);
}
async function scan(e){
  e.preventDefault(); const t=T[L];
  const artist=document.getElementById('artist').value.trim();
  const btn=document.getElementById('scanBtn'),err=document.getElementById('err');
  err.style.display='none'; btn.disabled=true; btn.textContent=t.scanning;
  try{
    const r=await fetch(ENDPOINT+"?artist="+encodeURIComponent(artist),{headers:{apikey:KEY}});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    if(!d.found){err.textContent=t.notfound;err.style.display='block';showProd();return;}
    last={artist:d.artist,total:d.total,bb:d.black_box,year:d.year_from,sample:d.sample||[],shown:true};
    renderResult(t);
    document.getElementById('result').style.display='block';
  }catch(ex){err.textContent="Error: "+ex.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent=t.scan;}
}
async function join(e){
  e.preventDefault(); const t=T[L];
  const email=document.getElementById('email').value.trim();
  const btn=document.getElementById('joinBtn'); btn.disabled=true; btn.textContent='…';
  try{
    await fetch(ENDPOINT,{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,artist:last.artist,total:last.total,black_box:last.bb})});
    document.getElementById('mailForm').style.display='none';
    const m=document.getElementById('msg'); m.textContent=t.joined; m.style.display='block';
  }catch(ex){btn.disabled=false;btn.textContent=t.join;}
}
function showProd(){var el=document.getElementById('prodHelp');el.style.display='block';el.scrollIntoView({behavior:'smooth',block:'nearest'});}
function focusArtist(){var a=document.getElementById('artist');a.value='';a.focus();window.scrollTo({top:0,behavior:'smooth'});}
(function(){var s;try{s=localStorage.getItem('solnota_lang');}catch(e){}setLang(['es','en','pt','fr'].indexOf(s)>=0?s:'es');})();
