<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLNOTA — Escanea tu música</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFB02E;--gold2:#FFC65C;--bg:#FCFAF5;--panel:#FBF8F0;--cream:#1A1611;--muted:#6E6657;--line:#ECE6D8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Instrument Sans',-apple-system,sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;}
.lang{position:fixed;top:20px;right:22px;display:flex;gap:2px;border:1px solid #ECE6D8;border-radius:11px;padding:3px;}
.lang button{padding:6px 13px;border:none;background:transparent;color:var(--muted);font-weight:500;font-size:13px;border-radius:8px;cursor:pointer;letter-spacing:1px;}
.lang button.active{background:var(--gold);color:#1a160c;}
.card{max-width:560px;width:100%;text-align:center;}
h1{font-family:'Italiana',serif;font-size:clamp(44px,11vw,70px);letter-spacing:8px;padding-left:8px;background:linear-gradient(90deg,#FFC65C,#FFB02E,#B96A00);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
.tag{color:var(--gold);font-size:12px;letter-spacing:5px;margin-top:6px;text-transform:uppercase;}
.lead{font-size:19px;color:#2A2419;margin:28px 0 6px;line-height:1.5;}
.sub{font-size:14px;color:var(--muted);margin-bottom:26px;}
form{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
input{flex:1;min-width:230px;padding:16px 18px;border-radius:12px;border:1px solid #ECE6D8;background:#FBF8F0;color:var(--cream);font-size:16px;font-family:inherit;}
input:focus{outline:none;border-color:var(--gold);}
button.cta{padding:16px 28px;border:none;border-radius:12px;background:var(--gold);color:#1a160c;font-weight:600;font-size:16px;cursor:pointer;transition:transform .15s,background .15s;letter-spacing:.5px;}
button.cta:hover{transform:translateY(-2px);background:var(--gold2);}
button.cta:disabled{opacity:.5;cursor:wait;transform:none;}
.result{display:none;margin-top:30px;background:var(--panel);border:1px solid var(--gold);border-radius:18px;padding:30px;text-align:left;}
.result .num{font-family:'Italiana',serif;font-size:64px;color:var(--cream);line-height:1;}
.result .lbl{font-size:13px;color:var(--muted);letter-spacing:1px;margin-bottom:18px;}
.result .big{font-family:'Italiana',serif;font-size:30px;color:var(--gold);line-height:1.25;margin-bottom:6px;}
.samples{font-size:13px;color:#6E6657;margin:14px 0;line-height:1.7;}
.samples b{color:var(--gold);}
.moneymap{margin:18px 0 4px;border-top:1px solid var(--line);padding-top:16px;}
.moneymap .mm-t{font-size:13px;color:var(--gold);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;}
.mm-row{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid #F4EFE2;}
.mm-row:last-child{border-bottom:none;}
.mm-ic{color:var(--gold);font-size:15px;flex:none;margin-top:1px;}
.mm-tx{font-size:13px;color:#4a4438;line-height:1.45;}
.mm-tx b{color:var(--cream);}
.cta-box{margin-top:18px;border-top:1px solid var(--line);padding-top:18px;}
.cta-box p{font-size:14px;margin-bottom:12px;color:#2A2419;}
.msg{display:none;margin-top:16px;font-size:16px;color:var(--gold2);font-weight:500;}
.err{color:#e0a; font-size:14px; margin-top:12px; display:none;}
footer{margin-top:34px;font-size:11px;color:#6E6657;letter-spacing:2px;}
</style>
<style id="premium-polish">
/* profundidad premium: tarjetas flotan sobre marfil */
.card,.panel,.result,.box,.tcard,.screen,.plan,.tier{box-shadow:0 1px 2px rgba(36,30,15,.05),0 10px 30px rgba(36,30,15,.09)}

/* ===== Pulido premium universal SOLNOTA ===== */
html{scroll-behavior:smooth}
body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
::selection{background:rgba(255,176,46,.28);color:#1A1611}
h1,h2,h3{text-wrap:balance}
p,li{text-wrap:pretty}
a,button{transition:color .18s ease,background-color .18s ease,border-color .18s ease,transform .18s ease,box-shadow .18s ease}
a:focus-visible,button:focus-visible,input:focus-visible,[tabindex]:focus-visible{outline:2px solid #FFB02E;outline-offset:3px;border-radius:8px}
@media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}a,button{transition:none}}
</style>
</head>
<body>
<div class="lang">
  <button id="btn-es" class="active" onclick="setLang('es')">ES</button>
  <button id="btn-en" onclick="setLang('en')">EN</button>
  <button id="btn-pt" onclick="setLang('pt')">PT</button>
  <button id="btn-fr" onclick="setLang('fr')">FR</button>
</div>
<div class="card">
  <h1>SOLNOTA</h1>
  <div class="tag" id="tag">TU DINERO · A LA LUZ</div>
  <p class="lead" id="lead"></p>
  <p class="sub" id="sub"></p>

  <form id="scanForm" onsubmit="scan(event)">
    <input id="artist" type="text" required autocomplete="off">
    <button type="submit" class="cta" id="scanBtn"></button>
  </form>
  <div class="err" id="err"></div>

  <div class="result" id="result">
    <div class="num" id="rNum">0</div>
    <div class="lbl" id="rLbl"></div>
    <div class="big" id="rBig"></div>
    <div class="since" id="rSince" style="font-size:13px;color:var(--gold2);margin:6px 0 0;"></div>
    <div class="samples" id="rSamples"></div>
    <div class="moneymap" id="rMap"></div>
    <div class="cta-box">
      <p id="ctaP"></p>
      <form id="mailForm" onsubmit="join(event)">
        <input id="email" type="email" required>
        <button type="submit" class="cta" id="joinBtn"></button>
      </form>
      <div class="msg" id="msg"></div>
    </div>
  </div>

  <footer>SOLNOTA · SOL MUSIC CORP</footer>
</div>

<script>
const ENDPOINT="https://bdjjalwlcuhfzjeqxtwi.supabase.co/functions/v1/scan";
const KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJkamphbHdsY3VoZnpqZXF4dHdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MDAxNTUsImV4cCI6MjA5NjE3NjE1NX0.wsUI9V0oHwtMXrC2Q0JXrQZj3SXC6Ie4ukX0pLvsj6M";
const T={
 es:{tag:"TU DINERO · A LA LUZ",
     lead:"Tu música lleva años generando dinero.<br>Descubre cuánto NO te está llegando.",
     sub:"Escribe tu nombre de artista. Escaneamos tu catálogo en segundos.",
     ph:"Tu nombre de artista", scan:"Escanear", scanning:"Escaneando…",
     lbl:"obras tuyas generando dinero",
     big:(b)=>`💰 Tienes regalías <span style="color:var(--cream)">sin reclamar</span>.<div style="font-size:14px;color:#4a4438;font-weight:400;margin-top:12px;line-height:1.55">El <b style="color:var(--gold)">black box</b> es el dinero que las plataformas ya recaudaron de tu música, pero que nadie ha cobrado. Te ayudamos a recuperarlo.</div>`,
     since:(y,n)=>`🎵 Generando regalías desde <b>${y}</b>${n?` — ${n} años cobrando.`:'.'}`,
     mapT:"Dónde está tu dinero — 6 fuentes",
     map:`<div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Máster (SoundExchange)</b> — radio digital por tus grabaciones.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Mecánicas (The MLC)</b> — streaming en EE.UU. (gran parte del black box).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Performance (tu PRO)</b> — ejecución pública (BMI/ASCAP + PROs).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Sync</b> — tu música en TV, cine, anuncios y videojuegos.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Derechos conexos</b> — performance del máster fuera de EE.UU.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>YouTube (Content ID)</b> — cuando tu música suena en videos de otros.</span></div>`,
     ej:"Ej: ", notfound:"No encontramos ese artista. Revisa el nombre exacto.",
     ctaP:'Te ayudamos a recuperar ese dinero — <b style="color:var(--gold)">0% comisión.</b> Déjanos tu correo:',
     emailph:"tu@email.com", join:"Quiero mi dinero", joined:"¡Estás en la lista! Te contactamos pronto."},
 en:{tag:"TU DINERO · A LA LUZ",
     lead:"Your music has been making money for years.<br>Find out how much isn't reaching you.",
     sub:"Type your artist name. We scan your catalog in seconds.",
     ph:"Your artist name", scan:"Scan", scanning:"Scanning…",
     lbl:"of your works are earning money",
     big:(b)=>`💰 You have <span style="color:var(--cream)">unclaimed</span> royalties.<div style="font-size:14px;color:#4a4438;font-weight:400;margin-top:12px;line-height:1.55">The <b style="color:var(--gold)">black box</b> is money that platforms already collected from your music, but no one has claimed. We help you get it back.</div>`,
     since:(y,n)=>`🎵 Earning royalties since <b>${y}</b>${n?` — ${n} years and counting.`:'.'}`,
     mapT:"Where your money is — 6 sources",
     map:`<div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Master (SoundExchange)</b> — digital radio for your recordings.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Mechanical (The MLC)</b> — US streaming (much of the black box).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Performance (your PRO)</b> — public performance (BMI/ASCAP + PROs).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Sync</b> — your music in TV, film, ads and video games.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Neighbouring rights</b> — master performance outside the US.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>YouTube (Content ID)</b> — when your music plays in others' videos.</span></div>`,
     ej:"E.g.: ", notfound:"We couldn't find that artist. Check the exact name.",
     ctaP:'We help you recover that money — <b style="color:var(--gold)">0% commission.</b> Drop your email:',
     emailph:"you@email.com", join:"I want my money", joined:"You're on the list! We'll reach out soon."},
 pt:{tag:"TU DINERO · A LA LUZ",
     lead:"Tua música gera dinheiro há anos.<br>Descobre quanto NÃO está chegando até ti.",
     sub:"Escreve teu nome de artista. Escaneamos teu catálogo em segundos.",
     ph:"Teu nome de artista", scan:"Escanear", scanning:"Escaneando…",
     lbl:"obras tuas gerando dinheiro",
     big:(b)=>`💰 Tens royalties <span style="color:var(--cream)">não reivindicados</span>.<div style="font-size:14px;color:#4a4438;font-weight:400;margin-top:12px;line-height:1.55">O <b style="color:var(--gold)">black box</b> é o dinheiro que as plataformas já arrecadaram da tua música, mas que ninguém reivindicou. Te ajudamos a recuperá-lo.</div>`,
     since:(y,n)=>`🎵 Gerando royalties desde <b>${y}</b>${n?` — ${n} anos recebendo.`:'.'}`,
     mapT:"Onde está o teu dinheiro — 6 fontes",
     map:`<div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Master (SoundExchange)</b> — rádio digital pelas tuas gravações.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Mecânicas (The MLC)</b> — streaming nos EUA (grande parte do black box).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Performance (tua PRO)</b> — execução pública (BMI/ASCAP + PROs).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Sync</b> — tua música em TV, cinema, anúncios e jogos.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Direitos conexos</b> — performance do master fora dos EUA.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>YouTube (Content ID)</b> — quando tua música toca em vídeos de outros.</span></div>`,
     ej:"Ex: ", notfound:"Não encontramos esse artista. Verifica o nome exato.",
     ctaP:'Te ajudamos a recuperar esse dinheiro — <b style="color:var(--gold)">0% comissão.</b> Deixa teu e-mail:',
     emailph:"teu@email.com", join:"Quero meu dinheiro", joined:"Estás na lista! Entramos em contato em breve."},
 fr:{tag:"TU DINERO · A LA LUZ",
     lead:"Ta musique génère de l'argent depuis des années.<br>Découvre combien ne te parvient PAS.",
     sub:"Écris ton nom d'artiste. On scanne ton catalogue en quelques secondes.",
     ph:"Ton nom d'artiste", scan:"Scanner", scanning:"Analyse…",
     lbl:"de tes œuvres génèrent de l'argent",
     big:(b)=>`💰 Tu as des royalties <span style="color:var(--cream)">non réclamées</span>.<div style="font-size:14px;color:#4a4438;font-weight:400;margin-top:12px;line-height:1.55">Le <b style="color:var(--gold)">black box</b> est l'argent que les plateformes ont déjà perçu de ta musique, mais que personne n'a réclamé. On t'aide à le récupérer.</div>`,
     since:(y,n)=>`🎵 Génère des royalties depuis <b>${y}</b>${n?` — ${n} ans et ça continue.`:'.'}`,
     mapT:"Où est ton argent — 6 sources",
     map:`<div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Master (SoundExchange)</b> — radio numérique pour tes enregistrements.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Mécanique (The MLC)</b> — streaming aux États-Unis (une grande partie du black box).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Performance (ta PRO)</b> — exécution publique (BMI/ASCAP + PRO).</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Sync</b> — ta musique à la TV, au cinéma, dans les pubs et jeux.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>Droits voisins</b> — performance du master hors des États-Unis.</span></div><div class="mm-row"><span class="mm-ic">●</span><span class="mm-tx"><b>YouTube (Content ID)</b> — quand ta musique joue dans les vidéos des autres.</span></div>`,
     ej:"Ex. : ", notfound:"Artiste introuvable. Vérifie le nom exact.",
     ctaP:'On t\'aide à récupérer cet argent — <b style="color:var(--gold)">0% commission.</b> Laisse ton e-mail :',
     emailph:"toi@email.com", join:"Je veux mon argent", joined:"Tu es sur la liste ! On te contacte bientôt."}
};
let L="es", last={artist:"",total:0,bb:0,year:0,sample:[],shown:false};
function renderResult(t){
  document.getElementById('rNum').textContent=last.total;
  document.getElementById('rLbl').textContent=t.lbl;
  document.getElementById('rBig').innerHTML=t.big(last.bb);
  var _yrs=last.year?(new Date().getFullYear()-last.year):0;
  document.getElementById('rSince').innerHTML=last.year?t.since(last.year,_yrs):"";
  document.getElementById('rMap').innerHTML='<div class="mm-t">'+t.mapT+'</div>'+t.map;
  document.getElementById('rSamples').innerHTML=last.sample&&last.sample.length?t.ej+last.sample.map(s=>`<b>${s}</b>`).join(" · "):"";
}
function setLang(l){
  L=l; const t=T[l]; document.documentElement.lang=l;
  document.getElementById('tag').textContent=t.tag;
  document.getElementById('lead').innerHTML=t.lead;
  document.getElementById('sub').textContent=t.sub;
  document.getElementById('artist').placeholder=t.ph;
  document.getElementById('scanBtn').textContent=t.scan;
  document.getElementById('email').placeholder=t.emailph;
  document.getElementById('joinBtn').textContent=t.join;
  document.getElementById('ctaP').innerHTML=t.ctaP;
  ['es','en','pt','fr'].forEach(function(x){document.getElementById('btn-'+x).classList.toggle('active',l===x);});
  if(last.shown) renderResult(t);
}
async function scan(e){
  e.preventDefault(); const t=T[L];
  const artist=document.getElementById('artist').value.trim();
  const btn=document.getElementById('scanBtn'),err=document.getElementById('err');
  err.style.display='none'; btn.disabled=true; btn.textContent=t.scanning;
  try{
    const r=await fetch(ENDPOINT+"?artist="+encodeURIComponent(artist),{headers:{apikey:KEY}});
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    if(!d.found){err.textContent=t.notfound;err.style.display='block';return;}
    last={artist:d.artist,total:d.total,bb:d.black_box,year:d.year_from,sample:d.sample||[],shown:true};
    renderResult(t);
    document.getElementById('result').style.display='block';
  }catch(ex){err.textContent="Error: "+ex.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent=t.scan;}
}
async function join(e){
  e.preventDefault(); const t=T[L];
  const email=document.getElementById('email').value.trim();
  const btn=document.getElementById('joinBtn'); btn.disabled=true; btn.textContent='…';
  try{
    await fetch(ENDPOINT,{method:'POST',headers:{apikey:KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,artist:last.artist,total:last.total,black_box:last.bb})});
    document.getElementById('mailForm').style.display='none';
    const m=document.getElementById('msg'); m.textContent=t.joined; m.style.display='block';
  }catch(ex){btn.disabled=false;btn.textContent=t.join;}
}
(function(){var n=(navigator.language||'es').slice(0,2).toLowerCase();setLang(['es','en','pt','fr'].indexOf(n)>=0?n:'es');})();
</script>
</body>
</html>
