<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLNOTA · Entrar</title>
<meta name="theme-color" content="#FCFAF5">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
  :root{--gold:#E08A00;--gold2:#FFB02E;--gold3:#B96A00;--ink:#1A1611;--mut:#6E6657;
        --bg:#FCFAF5;--bg2:#FAF6EC;--card:#FFFFFF;--line:#ECE6D8;--green:#0E9F6E;
        --grad:linear-gradient(92deg,#FFB02E,#E08A00,#B96A00);--sh:0 18px 50px rgba(36,30,15,.10);}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Instrument Sans',system-ui,sans-serif;background:radial-gradient(1100px 500px at 50% -10%,var(--bg2),var(--bg));color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;line-height:1.55}
  .card{max-width:430px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--sh);padding:38px 32px 30px;text-align:center}
  .sn-wm{font-family:'Fraunces',Georgia,serif;font-weight:600;font-size:34px;letter-spacing:0;color:var(--ink);display:inline-flex;align-items:center;line-height:1;margin-bottom:6px}
  .sn-disc{position:relative;display:inline-block;width:.78em;height:.78em;border-radius:50%;margin:0 .02em;background:repeating-radial-gradient(circle at 50% 50%,rgba(255,255,255,.08) 0 1px,rgba(0,0,0,.05) 1px 2.5px),conic-gradient(from 210deg,#FFEBC4,#FFD27A,#E8941C,#A85F00,#FFCf6b,#FFEBC4,#E8941C,#FFD27A,#FFEBC4);box-shadow:inset 0 0 0 1.4px #A85F00;flex:0 0 auto}
  .sn-disc::before{content:"";position:absolute;inset:31%;border-radius:50%;background:var(--card)}
  .sn-disc::after{content:"";position:absolute;inset:41%;border-radius:50%;background:#1A1611}
  .bt{font-size:9.5px;font-weight:600;letter-spacing:3px;color:var(--gold);display:block;margin-bottom:22px}
  h2{font-family:'Fraunces',serif;font-weight:600;font-size:24px;margin-bottom:6px;letter-spacing:-.3px}
  p.sub{color:var(--mut);font-size:14.5px;margin-bottom:24px}
  form{display:flex;flex-direction:column;gap:12px}
  input{padding:15px 16px;border-radius:13px;border:1px solid var(--line);background:#fff;color:var(--ink);font-size:16px;font-family:inherit;width:100%}
  input:focus{outline:none;border-color:var(--gold2);box-shadow:0 0 0 3px rgba(255,176,46,.18)}
  button{padding:15px 18px;border:none;border-radius:13px;background:var(--grad);color:#fff;font-weight:700;font-size:16px;cursor:pointer;transition:.16s;font-family:inherit}
  button:hover{transform:translateY(-1px)}
  button:disabled{opacity:.6;cursor:default;transform:none}
  .msg{margin-top:18px;font-size:14.5px;display:none;padding:13px 14px;border-radius:12px;line-height:1.5}
  .msg.ok{display:block;background:#E7F6EF;color:var(--green);border:1px solid #BFE9D6}
  .msg.err{display:block;background:#FDECEC;color:#C0392B;border:1px solid #F4C9C5}
  .msg.info{display:block;background:var(--bg2);color:var(--mut);border:1px solid var(--line)}
  .badges{margin-top:26px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:11.5px;color:var(--mut);letter-spacing:.3px}
  .badges span::before{content:"— ";color:var(--gold)}
  footer{margin-top:24px;font-size:10.5px;letter-spacing:2px;color:#a59b86}
</style>
<script src="/solnota-theme.js"></script>
</head>
<body>
<div class="card">
  <span class="sn-wm">S<span class="sn-disc" aria-hidden="true"></span>LNOTA</span>
  <span class="bt">TU DINERO · A LA LUZ</span>
  <div id="view-login">
    <h2>Entra a tu dinero</h2>
    <p class="sub">Te enviamos un enlace mágico a tu correo. Sin contraseñas.</p>
    <form id="f">
      <input id="email" type="email" placeholder="tu@email.com" required autocomplete="email">
      <button type="submit" id="btn">Enviar enlace</button>
    </form>
    <div class="msg" id="msg"></div>
    <div class="badges">
      <span>Nunca tocamos tu dinero</span>
      <span>Tu música es 100% tuya</span>
      <span>0% comisión</span>
    </div>
  </div>
  <div id="view-loading" style="display:none">
    <h2>Entrando…</h2>
    <p class="sub">Un segundo, cargando tu cuenta.</p>
  </div>
  <footer>SOLNOTA · SOL MUSIC CORP</footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/solnota-auth.js"></script>
<script>
(async function(){
  function qs(k){return new URLSearchParams(location.search).get(k);}
  var next = qs("next");

  // ¿Volvió del enlace mágico? Si ya hay sesión, enruta por rol.
  var s = await snAuth.session();
  if (s) {
    document.getElementById("view-login").style.display="none";
    document.getElementById("view-loading").style.display="block";
    var p = await snAuth.profile(true);
    location.replace(next || snAuth.homeFor(p ? p.role : "artist"));
    return;
  }

  var f=document.getElementById("f"), btn=document.getElementById("btn"), msg=document.getElementById("msg");
  function show(t,cls){msg.className="msg "+cls;msg.textContent=t;}

  f.addEventListener("submit", async function(e){
    e.preventDefault();
    var email=document.getElementById("email").value.trim();
    if(!email) return;
    btn.disabled=true; btn.textContent="Enviando…";
    var redirect = location.origin + "/login.html" + (next ? ("?next="+encodeURIComponent(next)) : "");
    var r = await snAuth.signIn(email, redirect);
    if (r.error){
      show("No se pudo enviar: " + r.error.message, "err");
      btn.disabled=false; btn.textContent="Enviar enlace";
    } else {
      f.style.display="none";
      show("Listo ✦ Revisa tu correo ("+email+") y haz clic en el enlace para entrar.", "ok");
    }
  });
})();
</script>
</body>
</html>
